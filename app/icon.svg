<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 100 100"
  role="img"
  aria-label="Deckster"
>
  <defs>
    <linearGradient id="d-back" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#CCA8FE" />
      <stop offset="100%" stop-color="#A578F0" />
    </linearGradient>
    <linearGradient id="d-front" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9070F5" />
      <stop offset="100%" stop-color="#6840E0" />
    </linearGradient>
  </defs>

  <!-- Back card (light lavender) — upper-right, peeks out behind front card -->
  <rect x="42" y="8" width="54" height="42" rx="5" fill="url(#d-back)" />

  <!-- Front card (deep violet) — lower-left, dominates the icon -->
  <rect x="4" y="30" width="68" height="52" rx="5" fill="url(#d-front)" />

  <!-- Big white sparkle, focal point on the front card.
       4-point twinkle: outer radius 14, inner 3 → tall, pointy. -->
  <path
    d="M 32 42 L 34.1 53.9 L 46 56 L 34.1 58.1 L 32 70 L 29.9 58.1 L 18 56 L 29.9 53.9 Z"
    fill="#FFFFFF"
  />

  <!-- Small lavender sparkle, upper-right of front card -->
  <path
    d="M 60 38 L 60.6 41.4 L 64 42 L 60.6 42.6 L 60 46 L 59.4 42.6 L 56 42 L 59.4 41.4 Z"
    fill="#D6BFFB"
  />
</svg>
