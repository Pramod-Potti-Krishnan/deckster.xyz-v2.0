name: Deploy Frontend UAT

on:
  push:
    branches:
      - uat
  workflow_dispatch:

concurrency:
  group: frontend-uat
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Vercel UAT
    runs-on: ubuntu-latest
    environment: uat
    env:
      VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_UAT_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Install Vercel CLI
        run: pnpm dlx vercel@54.21.1 --version

      - name: Pull Vercel UAT environment
        run: pnpm dlx vercel@54.21.1 pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build Vercel UAT
        run: pnpm dlx vercel@54.21.1 build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy Vercel UAT
        run: pnpm dlx vercel@54.21.1 deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
