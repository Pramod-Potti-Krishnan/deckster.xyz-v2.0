name: Deploy Frontend Production

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      confirm:
        description: Type DEPLOY_PROD to confirm production deployment
        required: true

concurrency:
  group: frontend-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Vercel Production
    if: ${{ github.event_name == 'push' || (github.event.inputs.confirm == 'DEPLOY_PROD' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/prod-'))) }}
    runs-on: ubuntu-latest
    environment: production
    env:
      VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROD_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Install Vercel CLI
        run: pnpm dlx vercel@54.21.1 --version

      - name: Pull Vercel production environment
        run: pnpm dlx vercel@54.21.1 pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build Vercel production
        run: pnpm dlx vercel@54.21.1 build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy Vercel production
        run: pnpm dlx vercel@54.21.1 deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
